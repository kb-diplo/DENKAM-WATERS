{% extends 'base.html' %}

{% block title %}Error - Denkam Waters{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-circle text-danger" style="font-size: 4rem;"></i>
                    </div>
                    <h2 class="mb-4">Oops! Something went wrong</h2>
                    <p class="text-muted mb-4">{{ error_message }}</p>
                    
                    {% if error_details and debug %}
                    <div class="alert alert-info text-start">
                        <h5 class="alert-heading">Error Details:</h5>
                        <pre class="mb-0"><code>{{ error_details }}</code></pre>
                    </div>
                    {% endif %}

                    <div class="mt-4">
                        <a href="{% url 'dashboard' %}" class="btn btn-primary me-2">Return to Dashboard</a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">Go Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .card {
        border: none;
        border-radius: 10px;
    }
    .btn {
        padding: 0.75rem 1.5rem;
        border-radius: 5px;
    }
    pre {
        background-color: #f8f9fa;
        padding: 1rem;
        border-radius: 5px;
        font-size: 0.9rem;
    }
</style>
{% endblock %}
