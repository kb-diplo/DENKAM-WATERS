{% extends 'base.html' %}

{% block title %}Error {{ error_code }} - Denkam Waters{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1">{{ error_code }}</h1>
            <h2 class="mb-4">{{ error_message }}</h2>
            <p class="mb-4">Something went wrong. Please try again or contact support if the problem persists.</p>
            <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">Return to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
